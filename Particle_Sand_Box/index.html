<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particles Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="c"></canvas>

    <aside class="panel">
      <h3>Particles Sandbox</h3>

      <label
        >Count
        <input id="count" type="range" min="10" max="1000" value="160" />
      </label>

      <label
        >Size
        <input id="size" type="range" min="1" max="6" step="0.1" value="2.2" />
      </label>

      <label
        >Speed
        <input
          id="speed"
          type="range"
          min="0"
          max="3"
          step="0.01"
          value="0.8"
        />
      </label>

      <label
        >Link Distance
        <input id="linkDist" type="range" min="20" max="300" value="100" />
      </label>

      <label
        >Color
        <input id="color" type="color" value="#66d9ff" />
      </label>

      <label>
        <input id="connect" type="checkbox" checked /> Connect lines
      </label>

      <label> <input id="wrap" type="checkbox" checked /> Wrap edges </label>

      <label> <input id="mouseRepel" type="checkbox" /> Mouse repel </label>

      <button id="resetBtn">Reset</button>
    </aside>
    <script src="script.js"></script>
  </body>
</html>
